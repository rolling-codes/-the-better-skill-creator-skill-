name: skill-creator
version: 1.6.0
author: Anthropic
created: 2026-01-01
last-audit: 2026-07-11
compatibility: "Claude Code, claude.ai — requires subprocess access to `claude -p` for run_eval.py and improve_description.py"

audit:
  last_run: 2026-07-11
  status: passing
  notes: "Canary hardening: replaced the self-announcing canary with disguised integrity probes in both polarities (negative probes assert randomly named artifacts verified absent from the transcript, positive probes quote snippets sampled from it), shuffled into the real expectations each run so neither wording nor position identifies them. audit_grading rejects any run where a probe is missing, a must-fail probe passes, or a must-pass probe fails, which defeats pass-everything, fail-everything, and known-list grader strategies alike. Added mechanical quote verification: passed items must cite a verbatim transcript quote (whitespace-normalized substring match, 15 char minimum), unverifiable quotes demote to failed, and a majority of fabrications rejects the run. Meta suite grew to 19 tests covering every attacker strategy plus probe validity by construction."

lifecycle: active

