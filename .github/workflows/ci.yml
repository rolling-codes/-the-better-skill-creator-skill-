name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Skill

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run validation pipeline
        run: |
          bash scripts/validate_all.sh .

  lint:
    runs-on: ubuntu-latest
    name: Lint Code
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pylint flake8

      - name: Run linter on scripts
        run: |
          python3 scripts/lint.py .

      - name: Run flake8
        run: |
          flake8 scripts/*.py --count --select=E9,F63,F7,F82 --show-source --statistics || true

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run skill tests
        run: |
          python3 scripts/skill_test.py . 2>&1 | tee test-results.txt || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  security:
    runs-on: ubuntu-latest
    name: Security Checks
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run static analysis
        run: |
          python3 scripts/static_analysis.py .

      - name: Check for secrets
        run: |
          # Basic check for common secret patterns
          if grep -r "password\|api_key\|secret\|token" --include="*.md" --include="*.py" . 2>/dev/null | grep -v "example\|placeholder\|REDACTED"; then
            echo "Warning: potential secrets found in documentation or code"
            exit 1
          fi || true
